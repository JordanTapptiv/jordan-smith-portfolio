        <a class="nav-contact" href="#contact">Contact</a>

    </header>

    <main id="top">
      <section class="hero" aria-labelledby="hero-title">
        <h1 id="hero-title" class="name-field" aria-label="Jordan Smith">
          <span class="name-line" aria-hidden="true">
            <span class="letter" data-letter="J"><span class="letter-face">J</span></span>
            <span class="letter" data-letter="O"><span class="letter-face">O</span></span>
            <span class="letter" data-letter="R"><span class="letter-face">R</span></span>
            <span class="letter" data-letter="D"><span class="letter-face">D</span></span>
            <span class="letter" data-letter="A"><span class="letter-face">A</span></span>
            <span class="letter" data-letter="N"><span class="letter-face">N</span></span>
          </span>
          <span class="name-line" aria-hidden="true">
            <span class="letter" data-letter="S"><span class="letter-face">S</span></span>
            <span class="letter" data-letter="M"><span class="letter-face">M</span></span>
            <span class="letter" data-letter="I"><span class="letter-face">I</span></span>
            <span class="letter" data-letter="T"><span class="letter-face">T</span></span>
            <span class="letter" data-letter="H"><span class="letter-face">H</span></span>
          </span>

        <ul class="category-row" aria-label="Work categories">
          <li>Decks</li>
          <li>Illustration</li>
          <li>Email</li>
          <li>UI/UX</li>
          <li>Web</li>
        </ul>
      </section>

      <section id="work" class="work-grid" aria-label="Selected work">
        <article class="work-card" tabindex="0" aria-label="View UrsaBio project" data-work-title="UrsaBio" data-slides="assets/01%20UrsaBio/02.png|assets/01%20UrsaBio/03.png|assets/01%20UrsaBio/04.png|assets/01%20UrsaBio/05.png|assets/01%20UrsaBio/06.png">
          <img class="work-cover" src="assets/01%20UrsaBio/01.png" alt="UrsaBio project cover" />
        </article>
        <article class="work-card" tabindex="0" aria-label="View Board project" data-work-title="Board" data-slides="assets/02%20Board/02.png|assets/02%20Board/03.png">
          <img class="work-cover" src="assets/02%20Board/01.png" alt="Board project cover" />
        </article>
        <article class="work-card" tabindex="0" aria-label="View Lumindt project" data-work-title="Lumindt" data-slides="assets/03%20Lumindt/02.png|assets/03%20Lumindt/03.png">
          <img class="work-cover" src="assets/03%20Lumindt/01.png" alt="Lumindt project cover" />
        </article>
        <article class="work-card" tabindex="0" aria-label="View Illustrations project" data-work-title="Illustrations" data-slides="assets/04%20Illustrations/02.png|assets/04%20Illustrations/03.png|assets/04%20Illustrations/04.png|assets/04%20Illustrations/05.png|assets/04%20Illustrations/06.png|assets/04%20Illustrations/07.png|assets/04%20Illustrations/08.png">
          <img class="work-cover" src="assets/04%20Illustrations/01.png" alt="Illustrations project cover" />
        </article>
        <article class="work-card" tabindex="0" aria-label="View Salient Motion project" data-work-title="Salient Motion" data-slides="assets/05%20Salient%20Motion/02.png|assets/05%20Salient%20Motion/03.png|assets/05%20Salient%20Motion/04.png|assets/05%20Salient%20Motion/05.png">
          <img class="work-cover" src="assets/05%20Salient%20Motion/01.png" alt="Salient Motion project cover" />
        </article>
        <article class="work-card" tabindex="0" aria-label="View Aerflo project" data-work-title="Aerflo" data-slides="assets/06%20Aerflo/02.png|assets/06%20Aerflo/03.png">
          <img class="work-cover" src="assets/06%20Aerflo/01.png" alt="Aerflo project cover" />
        </article>
        <article class="work-card" tabindex="0" aria-label="View PICI project" data-work-title="PICI" data-slides="assets/07%20PICI/02.png|assets/07%20PICI/03.png|assets/07%20PICI/04.png|assets/07%20PICI/05.png|assets/07%20PICI/06.png">
          <img class="work-cover" src="assets/07%20PICI/01.png" alt="PICI project cover" />
        </article>
        <article class="work-card" tabindex="0" aria-label="View Protillion project" data-work-title="Protillion" data-slides="assets/08%20Protillion/02.png|assets/08%20Protillion/03.png|assets/08%20Protillion/04.png|assets/08%20Protillion/05.png|assets/08%20Protillion/06.png|assets/08%20Protillion/07.png">
          <img class="work-cover" src="assets/08%20Protillion/01.png" alt="Protillion project cover" />

        <article class="work-card" tabindex="0" aria-label="View BioCollective project" data-work-title="BioCollective" data-slides="assets/10%20BioCollective/02.png|assets/10%20BioCollective/03.png|assets/10%20BioCollective/04.png|assets/10%20BioCollective/05.png|assets/10%20BioCollective/06.png">

      </section>

      <section id="contact" class="contact-section" aria-labelledby="contact-title">
        <div class="contact-copy">
          <p class="section-kicker">Contact</p>
          <h2 id="contact-title">Let’s build the next thing.</h2>
        </div>
        <form
          id="contact-form"
          class="contact-form"
          action="https://formsubmit.co/ajax/jordan.smith@tapptiv.com"
          method="post"
          novalidate
        >
          <input type="text" name="_honey" tabindex="-1" autocomplete="off" class="form-honey" aria-hidden="true" />
          <input type="hidden" name="_subject" value="New portfolio contact form message" />
          <input type="hidden" name="_template" value="box" />
          <input type="hidden" name="_captcha" value="false" />
          <label>
            <span>Name</span>
            <input type="text" name="name" autocomplete="name" required />
          </label>
          <label>
            <span>Email</span>
            <input type="email" name="email" autocomplete="email" required />
          </label>
          <label class="message-field">
            <span>Message</span>
            <textarea name="message" rows="5" required></textarea>
          </label>
          <button type="submit">Send</button>
          <p class="form-status" role="status" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <a class="footer-brand" href="#top" aria-label="Jordan Smith home">
        <img class="brand-logo brand-logo-footer" src="assets/logo-black.svg" alt="" aria-hidden="true" />
        <span>Jordan Smith</span>
      </a>
      <a href="#contact">Contact</a>
    </footer>

    <div class="work-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
      <button class="modal-close" type="button" aria-label="Close work preview">Close</button>
      <div class="modal-frame">
        <button class="carousel-btn carousel-prev" type="button" aria-label="Previous image">Prev</button>
        <div class="carousel-viewport" aria-live="polite">
          <div class="carousel-track"></div>
        </div>
        <button class="carousel-btn carousel-next" type="button" aria-label="Next image">Next</button>
        <div class="modal-meta">
          <p id="modal-title">Work Example</p>
          <p class="carousel-count" aria-label="Carousel position">1 / 1</p>
        </div>
      </div>
    </div>

    <script src="script.js?v=20260720-contact"></script>
  </body>
</html>

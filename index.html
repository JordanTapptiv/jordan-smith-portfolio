<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Portfolio website for Jordan Smith, featuring decks, illustration, email, UI/UX, and web work."
    />
    <title>Jordan Smith Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wdth,wght@12..96,75..100,800&family=Tektur:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="cursor-dot" aria-hidden="true"><span>View</span></div>

    <header class="site-nav" aria-label="Primary navigation">
      <nav class="nav-inner">
        <div class="location-group" aria-label="Location">
          <span class="location-mark" aria-hidden="true">
            <span></span><span></span><span></span><span></span>
          </span>
          <span>Columbus Ohio</span>
        </div>
        <a class="mark-link" href="#top" aria-label="Jordan Smith home">
          <img class="brand-logo brand-logo-top" src="assets/logo-lime.svg" alt="" aria-hidden="true" />
        </a>
        <a class="nav-contact" href="#contact">Contact</a>
      </nav>
    </header>

    <main id="top">
      <section class="hero" aria-labelledby="hero-title">
        <h1 id="hero-title" class="name-field" aria-label="Jordan Smith">
          <svg class="name-schematic" viewBox="0 0 839 378" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
            <defs>
              <mask id="name-schematic-mask">
                <rect width="839" height="378" fill="black" />
                <text x="419.5" y="152" text-anchor="middle">JORDAN</text>
                <text x="419.5" y="316" text-anchor="middle">SMITH</text>
              </mask>
            </defs>
            <g class="schematic-outline">
              <text x="419.5" y="152" text-anchor="middle">JORDAN</text>
              <text x="419.5" y="316" text-anchor="middle">SMITH</text>
            </g>
            <g class="schematic-lines" mask="url(#name-schematic-mask)">
              <path d="M58 78H190V116H282V70H380V118H502V82H724" />
              <path d="M74 132H168V176H248V138H348V178H452V128H604V170H760" />
              <path d="M88 246H176V204H284V252H390V212H520V258H724" />
              <path d="M112 308H234V270H326V318H474V278H592V322H748" />
              <path d="M158 34V140M246 44V210M336 58V156M450 46V230M568 48V176M688 62V248" />
              <path d="M126 92c34 0 34 42 68 42s34-42 68-42 34 42 68 42" />
              <path d="M490 112c32 0 32-38 64-38s32 38 64 38 32-38 64-38" />
              <path d="M158 286c38 0 38-38 76-38s38 38 76 38 38-38 76-38" />
              <rect x="204" y="76" width="70" height="46" rx="6" />
              <rect x="536" y="122" width="92" height="54" rx="8" />
              <rect x="392" y="244" width="96" height="58" rx="8" />
              <circle cx="666" cy="134" r="32" />
              <circle cx="666" cy="134" r="10" />
              <path d="M666 134l-6-28M666 134l27 9M666 134l-20 21" />
              <circle cx="268" cy="284" r="26" />
              <circle cx="268" cy="284" r="8" />
              <path d="M268 284l-20-15M268 284l24-8M268 284l-4 24" />
              <path d="M84 98h18M116 98h18M306 98h18M338 98h18M416 98h18M746 98h18" />
              <path d="M112 228h18M144 228h18M514 228h18M546 228h18M704 228h18" />
              <path d="M232 52v-20h92v20M556 206v-24h112v24M118 326v24h124v-24" />
              <circle cx="112" cy="132" r="8" />
              <circle cx="348" cy="178" r="8" />
              <circle cx="502" cy="82" r="8" />
              <circle cx="724" cy="246" r="8" />
              <circle cx="474" cy="318" r="8" />
            </g>
          </svg>
          <span class="name-line" aria-hidden="true">
            <span class="letter" data-letter="J"><span class="letter-face">J</span></span>
            <span class="letter" data-letter="O"><span class="letter-face">O</span></span>
            <span class="letter" data-letter="R"><span class="letter-face">R</span></span>
            <span class="letter" data-letter="D"><span class="letter-face">D</span></span>
            <span class="letter" data-letter="A"><span class="letter-face">A</span></span>
            <span class="letter" data-letter="N"><span class="letter-face">N</span></span>
          </span>
          <span class="name-line" aria-hidden="true">
            <span class="letter" data-letter="S"><span class="letter-face">S</span></span>
            <span class="letter" data-letter="M"><span class="letter-face">M</span></span>
            <span class="letter" data-letter="I"><span class="letter-face">I</span></span>
            <span class="letter" data-letter="T"><span class="letter-face">T</span></span>
            <span class="letter" data-letter="H"><span class="letter-face">H</span></span>
          </span>
        </h1>

        <ul class="category-row" aria-label="Work categories">
          <li>Decks</li>
          <li>Illustration</li>
          <li>Email</li>
          <li>UI/UX</li>
          <li>Web</li>
        </ul>
      </section>

      <section id="work" class="work-grid" aria-label="Selected work">
        <article class="work-card" tabindex="0" aria-label="View work example one" data-work-title="Work Example 01"></article>
        <article class="work-card" tabindex="0" aria-label="View work example two" data-work-title="Work Example 02"></article>
        <article class="work-card" tabindex="0" aria-label="View work example three" data-work-title="Work Example 03"></article>
        <article class="work-card" tabindex="0" aria-label="View work example four" data-work-title="Work Example 04"></article>
        <article class="work-card" tabindex="0" aria-label="View work example five" data-work-title="Work Example 05"></article>
        <article class="work-card" tabindex="0" aria-label="View work example six" data-work-title="Work Example 06"></article>
        <article class="work-card" tabindex="0" aria-label="View work example seven" data-work-title="Work Example 07"></article>
      </section>

      <section id="contact" class="contact-section" aria-labelledby="contact-title">
        <div class="contact-copy">
          <p class="section-kicker">Contact</p>
          <h2 id="contact-title">Let’s build the next thing.</h2>
        </div>
        <form class="contact-form" action="mailto:hello@example.com" method="post" enctype="text/plain">
          <label>
            <span>Name</span>
            <input type="text" name="name" autocomplete="name" required />
          </label>
          <label>
            <span>Email</span>
            <input type="email" name="email" autocomplete="email" required />
          </label>
          <label class="message-field">
            <span>Message</span>
            <textarea name="message" rows="5" required></textarea>
          </label>
          <button type="submit">Send</button>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <a class="footer-brand" href="#top" aria-label="Jordan Smith home">
        <img class="brand-logo brand-logo-footer" src="assets/logo-black.svg" alt="" aria-hidden="true" />
        <span>Jordan Smith</span>
      </a>
      <a href="#contact">Contact</a>
    </footer>

    <div class="work-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
      <button class="modal-close" type="button" aria-label="Close work preview">Close</button>
      <div class="modal-frame">
        <button class="carousel-btn carousel-prev" type="button" aria-label="Previous image">Prev</button>
        <div class="carousel-viewport" aria-live="polite">
          <div class="carousel-track"></div>
        </div>
        <button class="carousel-btn carousel-next" type="button" aria-label="Next image">Next</button>
        <div class="modal-meta">
          <p id="modal-title">Work Example</p>
          <p class="carousel-count" aria-label="Carousel position">1 / 1</p>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
